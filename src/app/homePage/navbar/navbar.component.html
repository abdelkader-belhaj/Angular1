<header class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" fragment="top" class="brand">TunisiaTour</a>

    <ul class="menu">
      <li><a routerLink="/" fragment="accueil">Accueil</a></li>
      <li><a routerLink="/" fragment="voyages">Voyages</a></li>
      <li><a routerLink="/" fragment="hotels">Hotels</a></li>
      <li><a routerLink="/" fragment="bons-plans">Bons Plans</a></li>
      <li><a routerLink="/" fragment="contact">Contact</a></li>
    </ul>

    <button *ngIf="!isAuthenticated" class="btn" type="button" (click)="openLoginDialog()">
      Connexion
    </button>

    <div *ngIf="isAuthenticated" class="user-menu" (click)="$event.stopPropagation()">
      <button class="user-trigger" type="button" (click)="toggleUserMenu($event)">
        <span class="user-avatar">{{ currentUserName.charAt(0) }}</span>
        <span class="user-meta">
          <strong>{{ currentUserName }}</strong>
          <small>{{ currentUserRole }}</small>
        </span>
      </button>

      <div *ngIf="isUserMenuOpen" class="user-dropdown" role="menu" aria-label="Menu utilisateur">
        <div class="user-dropdown-head">
          <span class="dropdown-title">Mon espace compte</span>
          <span class="dropdown-subtitle">Acces rapide a vos reglages</span>
        </div>
        <div class="user-bio-preview">
          <p>{{ currentUserBio }}</p>
        </div>

        <button type="button" role="menuitem" (click)="goToRoleModule()">
          <span class="material-symbols-outlined">dashboard</span>
          {{ currentUserModuleLabel }}
        </button>
        <button type="button" role="menuitem" (click)="goToProfile()">
          <span class="material-symbols-outlined">person</span>
          Mon profil
        </button>
        <button type="button" role="menuitem" (click)="goToSecurity()">
          <span class="material-symbols-outlined">shield_lock</span>
          Securite du compte
          </button>
        <button *ngIf="isClientTouriste" type="button" role="menuitem" (click)="goToMesReclamations()">
          Mes réclamations
          <span *ngIf="unreadReclamations > 0" class="badge">{{ unreadReclamations }}</span>
        </button>
        <button *ngIf="!isAdminUser" type="button" role="menuitem" (click)="goToRoleModule()">
          Gerer mon module
        </button>
        <hr />
        <button type="button" role="menuitem" class="logout-item" (click)="logout()">
          <span class="material-symbols-outlined">logout</span>
          Deconnexion
        </button>
      </div>
    </div>
  </div>
</header>

<app-login-dialog
  [isOpen]="isLoginDialogOpen"
  (closed)="closeLoginDialog()"
></app-login-dialog>
