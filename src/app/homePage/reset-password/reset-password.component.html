<main class="reset-shell">
  <section class="reset-card" aria-labelledby="reset-title">
    <h1 id="reset-title">Reinitialiser le mot de passe</h1>
    <p class="subtitle">Choisissez votre nouveau mot de passe.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid" novalidate>
      <label class="field">
        <span>Nouveau mot de passe</span>
        <input type="password" formControlName="newPassword" placeholder="Au moins 6 caracteres" />
      </label>
      <small class="error" *ngIf="form.controls.newPassword.touched && form.controls.newPassword.invalid">
        Mot de passe invalide.
      </small>

      <label class="field">
        <span>Confirmer mot de passe</span>
        <input type="password" formControlName="confirmPassword" placeholder="Retaper le mot de passe" />
      </label>
      <small class="error" *ngIf="form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid">
        Confirmation invalide.
      </small>

      <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button class="submit-btn" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Validation...' : 'Mettre a jour le mot de passe' }}
      </button>
    </form>
  </section>
</main>
