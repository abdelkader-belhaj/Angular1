<div class="min-h-screen bg-slate-50 text-slate-900">
  <app-hebergeur-side-nav></app-hebergeur-side-nav>

  <main class="md:ml-64 min-h-screen">
    <app-navbar></app-navbar>

    <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 px-4 py-4 backdrop-blur supports-[backdrop-filter]:bg-white/80 lg:px-10">
      <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <div>
          <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-blue-900/80">TunisiaTour · Espace hébergeur</p>
          <h1 class="font-headline text-2xl font-extrabold tracking-tight text-slate-900">{{ pageTitle }}</h1>
          <p class="mt-1 text-sm text-slate-500">{{ pageSubtitle }}</p>
        </div>
        <button
          type="button"
          (click)="logout()"
          class="inline-flex shrink-0 items-center gap-2 rounded-xl border border-rose-200 bg-white px-4 py-2.5 text-sm font-semibold text-rose-700 shadow-sm hover:bg-rose-50">
          <span class="material-symbols-outlined text-xl">logout</span>
          Déconnexion
        </button>
      </div>
    </header>

    <div class="p-4 lg:p-10">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
