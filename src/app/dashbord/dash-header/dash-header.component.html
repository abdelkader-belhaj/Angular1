<header class="admin-header flex flex-col gap-4 mb-10 lg:flex-row lg:items-center lg:justify-between px-6 py-4 bg-white/50 backdrop-blur-sm rounded-3xl border border-slate-200">

  <div class="flex-1">
    <h1 class="text-3xl font-extrabold tracking-tight text-primary" *ngIf="showContextBlock">Tableau de Bord</h1>
    <p class="text-on-surface-variant" *ngIf="showContextBlock">Espace administrateur pour gerer le compte courant et la session.</p>
  </div>

  <!-- Admin Menu Button - RIGHT SIDE -->
  <div class="admin-menu" (click)="$event.stopPropagation()">
    <button class="admin-trigger" type="button" (click)="toggleAccountMenu($event)">
      <span class="admin-avatar material-symbols-outlined">admin_panel_settings</span>
      <span class="admin-meta">
        <strong>{{ currentUserName }}</strong>
        <small>Compte admin</small>
      </span>
      <span class="material-symbols-outlined text-sm">expand_more</span>
    </button>

    <ul *ngIf="isAccountMenuOpen" class="admin-dropdown" role="menu" aria-label="Menu admin">
      <li>
        <button type="button" role="menuitem" class="logout-item" (click)="logout()">
          Deconnexion
        </button>
      </li>
    </ul>
  </div>

</header>
