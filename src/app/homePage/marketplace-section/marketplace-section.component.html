<section class="py-24 bg-surface-container-lowest">
  <div class="max-w-screen-2xl mx-auto px-8">
    <div class="mb-12 text-center">
      <h2 class="font-headline text-4xl font-extrabold text-primary mb-2">Heritage Marketplace</h2>
      <p class="text-on-surface-variant">Authentic craftsmanship, delivered from the Souks to your doorstep.</p>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="text-center py-12">
      <p class="text-on-surface-variant">Chargement des produits...</p>
    </div>

    <!-- Products Grid -->
    <div *ngIf="!isLoading && products.length > 0" class="grid grid-cols-2 md:grid-cols-4 gap-8">
      <article *ngFor="let product of products" (click)="goToProductDetail(product.id)" class="flex flex-col gap-4 cursor-pointer hover:opacity-80 transition">
        <div class="aspect-square rounded-lg bg-surface-container-low overflow-hidden">
          <img 
            *ngIf="getProductImage(product)" 
            class="w-full h-full object-cover" 
            [src]="getProductImage(product)" 
            [alt]="product.name"
          />
          <div *ngIf="!getProductImage(product)" class="w-full h-full flex items-center justify-center bg-gray-200">
            <span class="text-gray-400">No Image</span>
          </div>
        </div>
        <div>
          <h4 class="font-bold text-primary">{{ product.name }}</h4>
          <p class="text-secondary font-bold text-sm">
            <span *ngIf="product.discountPrice">{{ product.discountPrice.toFixed(2) }} TND</span>
            <span *ngIf="!product.discountPrice">{{ product.price.toFixed(2) }} TND</span>
          </p>
          <p *ngIf="product.originalPrice && product.discountPrice" class="text-xs text-gray-500 line-through">
            {{ product.originalPrice.toFixed(2) }} TND
          </p>
        </div>
      </article>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && products.length === 0" class="text-center py-12">
      <p class="text-on-surface-variant">Aucun produit disponible</p>
    </div>
  </div>
</section>
