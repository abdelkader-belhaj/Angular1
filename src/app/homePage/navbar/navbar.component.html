<header class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" fragment="top" class="brand">TunisiaTour</a>

    <ul class="menu">
      <li><a routerLink="/" fragment="accueil">Accueil</a></li>
      <li><a routerLink="/" fragment="voyages">Voyages</a></li>
      <li><a routerLink="/" fragment="Categories">Hotels</a></li>
      <li><a routerLink="/" fragment="bons-plans">Bons Plans</a></li>
      <li><a routerLink="/" fragment="contact">Contact</a></li>
    </ul>

    <div class="auth-section">
      <ng-container *ngIf="!isAuthenticated">
        <button class="btn" type="button" (click)="openLoginDialog()">Connexion</button>
      </ng-container>

      <ng-container *ngIf="isAuthenticated">
        <div class="user-menu-container" style="display: flex; align-items: center; gap: 15px;">
          
          <button *ngIf="isTouristUser()" routerLink="/mes-reservations" class="user-profile-btn" style="padding: 8px; position: relative; margin-right: 15px;" title="Mes Réservations">
            <lucide-icon name="calendar" class="w-5 h-5 text-slate-700"></lucide-icon>
            <span *ngIf="unreadNotifsCount > 0" class="notif-badge">{{ unreadNotifsCount }}</span>
            <span *ngIf="unreadNotifsCount > 0" class="notif-badge-ping" aria-hidden="true"></span>
          </button>

          <div style="position: relative;">
            <button class="user-profile-btn" (click)="toggleUserMenu()">
              <img [src]="getProfileImage()" alt="profile" class="profile-avatar">
              <span>{{ getUserDisplayName() }}</span>
            </button>

            <div class="user-menu" *ngIf="showUserMenu">
              <button class="menu-option" (click)="editProfile(); toggleUserMenu()">
                Mon Profil
              </button>
              <button class="menu-option" (click)="logout(); toggleUserMenu()">
                Déconnexion
              </button>
            </div>
          </div>

        </div>
      </ng-container>
    </div>
  </div>
</header>

<app-login-dialog
  [isOpen]="isLoginDialogOpen"
  (closed)="closeLoginDialog()"
></app-login-dialog>
