<div class="bg-surface text-on-surface min-h-screen">
  <app-dash-side-nav></app-dash-side-nav>

  <main class="md:ml-64 p-6 lg:p-10">
    <app-dash-header></app-dash-header>

    <!-- Page Header -->
    <div class="flex items-center justify-between mb-8 mt-4">
      <div>
        <h1 class="text-3xl font-bold text-on-surface">Gestion des Événements</h1>
        <p class="text-on-surface-variant mt-1 text-sm">
          Approuver, rejeter et gérer tous les événements de la plateforme
        </p>
      </div>
      <button
        (click)="loadStats()"
        [disabled]="loading"
        class="flex items-center gap-2 px-4 py-2 rounded-xl border border-outline bg-surface text-on-surface text-sm font-medium hover:bg-surface-container transition disabled:opacity-50"
      >
        <svg class="w-4 h-4" [class.animate-spin]="loading" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Actualiser
      </button>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
      <app-admin-event-stat-card status="DRAFT"     [count]="stats.draftCount"></app-admin-event-stat-card>
      <app-admin-event-stat-card status="PUBLISHED" [count]="stats.publishedCount"></app-admin-event-stat-card>
      <app-admin-event-stat-card status="REJECTED"  [count]="stats.rejectedCount"></app-admin-event-stat-card>
      <app-admin-event-stat-card status="CANCELLED" [count]="stats.cancelledCount"></app-admin-event-stat-card>
    </div>

    <!-- Events List -->
    <app-admin-events-list></app-admin-events-list>

  </main>

  <app-dash-footer></app-dash-footer>
</div>
